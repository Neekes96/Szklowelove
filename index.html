<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szklowelove</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.4s ease;
        }

        /* Kolory tła */
        body.tlo-niebieski    { background: linear-gradient(135deg, #f5f7fa, #e3f2fd); }
        body.tlo-pomaranczowy { background: linear-gradient(135deg, #fff9f0, #ffe0cc); }
        body.tlo-zielony      { background: linear-gradient(135deg, #f0fff4, #c6f6d5); }
        body.tlo-rozowy       { background: linear-gradient(135deg, #fdf2f8, #f3d4e8); }
        body.tlo-fioletowy    { background: linear-gradient(135deg, #f3f0ff, #ddd6fe); }
        body.tlo-ciemny       { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        body.tlo-bialy        { background: #ffffff; }
        body.tlo-zolty        { background: linear-gradient(135deg, #fffef0, #fef9c3); }

        /* Ciemny motyw – biały tekst */
        body.tlo-ciemny header,
        body.tlo-ciemny footer { background: #0f3460; }
        body.tlo-ciemny h1 { color: #90caf9; }
        body.tlo-ciemny .description { color: #b0bec5; }
        body.tlo-ciemny .gallery-item { background: #0f3460; }
        body.tlo-ciemny .item-title { color: #e0e0e0; }

        header {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 40px;
        }

        h1 {
            color: #2196F3;
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.08);
        }

        .description {
            color: #546e7a;
            font-size: 1.15em;
            max-width: 750px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .gallery-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(33,150,243,0.25);
        }

        .gallery-item img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            display: block;
        }

        .item-title {
            padding: 14px;
            text-align: center;
            color: #37474f;
            font-weight: 600;
            font-size: 1em;
        }

        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            color: #90a4ae;
            font-size: 1.1em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-inner {
            position: relative;
            width: 90%;
            max-width: 820px;
            background: white;
            border-radius: 18px;
            padding: 22px;
        }

        .modal-img {
            width: 100%;
            max-height: 68vh;
            object-fit: contain;
            border-radius: 10px;
            display: block;
        }

        .modal-close {
            position: absolute;
            top: -14px; right: -14px;
            background: #2196F3;
            color: white;
            border: none;
            width: 38px; height: 38px;
            border-radius: 50%;
            font-size: 22px;
            line-height: 38px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
        }

        .modal-close:hover { background: #1565C0; }

        .modal-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: rgba(33,150,243,0.85);
            color: white; border: none;
            width: 46px; height: 46px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-btn:hover { background: #1976D2; }
        .modal-prev { left: 8px; }
        .modal-next { right: 8px; }

        .modal-counter {
            text-align: center;
            margin-top: 12px;
            color: #78909c;
            font-weight: 600;
            font-size: 0.95em;
        }

        /* Footer */
        footer {
            background: white;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 1200px;
            margin: 0 auto;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .social-links a {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 13px 22px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }

        .social-links a:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
        }

        .social-links a.facebook  { background: #1877F2; }
        .social-links a.instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
        .social-links a.vinted    { background: #09B1BA; }
        .social-links a.olx       { background: #3bab37; }

        .social-links svg {
            width: 20px; height: 20px;
            fill: white; flex-shrink: 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .description { font-size: 1em; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .gallery-item img { height: 180px; }
            .modal-inner { padding: 14px; }
        }
    </style>
</head>
<body class="tlo-niebieski">

<header>
    <h1>✨ Szklowelove ✨</h1>
    <p class="description" id="opis">Witamy w naszym magicznym świecie szkła!</p>
</header>

<div class="gallery" id="gallery">
    <div class="loading">⏳ Ładowanie produktów...</div>
</div>

<div class="modal" id="modal">
    <div class="modal-inner">
        <button class="modal-close" onclick="closeModal()">×</button>
        <button class="modal-btn modal-prev" onclick="zmienZdjecie(-1)">‹</button>
        <button class="modal-btn modal-next" onclick="zmienZdjecie(1)">›</button>
        <img class="modal-img" id="modalImg" src="" alt="">
        <div class="modal-counter" id="modalCounter"></div>
    </div>
</div>

<footer>
    <div class="social-links" id="socialLinks">
        <!-- wypełniane przez JS -->
    </div>
</footer>

<script>
const REPO = 'Neekes96/Szklowelove';
const API  = `https://api.github.com/repos/${REPO}/contents`;
const RAW  = `https://raw.githubusercontent.com/${REPO}/main`;

// ── Parsowanie front matter z pliku .md ──────────────────────────────────────
function parseMD(text) {
    const result = { title: '', images: [] };
    const lines = text.split('\n');
    let inside = false;
    let inImages = false;

    for (const line of lines) {
        if (line.trim() === '---') {
            if (!inside) { inside = true; continue; }
            else break;
        }
        if (!inside) continue;

        if (line.startsWith('title:')) {
            result.title = line.slice(6).trim().replace(/^['"]|['"]$/g, '');
        }
        if (line.startsWith('images:')) { inImages = true; continue; }
        if (inImages) {
            // obsługa obu formatów: "- image: ścieżka" lub "- ścieżka"
            const m1 = line.match(/^\s*-\s*image:\s*(.+)/);
            const m2 = line.match(/^\s*-\s*(?!image:)(.+)/);
            if (m1) result.images.push(m1[1].trim());
            else if (m2) result.images.push(m2[1].trim());
            else if (line.trim() && !line.startsWith(' ') && !line.startsWith('\t')) inImages = false;
        }
    }
    return result;
}

// ── Ładowanie ustawień (tło, opisy, linki social) ───────────────────────────
async function loadUstawienia() {
    try {
        const res = await fetch(`${RAW}/ustawienia.json`);
        if (!res.ok) return;
        const u = await res.json();

        if (u.opis)  document.getElementById('opis').textContent = u.opis;
        if (u.tlo)   document.body.className = 'tlo-' + u.tlo;

        // Social media
        const socials = [];
        if (u.facebook)  socials.push({ cls: 'facebook',  href: u.facebook,  label: 'Facebook',  icon: '<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>' });
        if (u.instagram) socials.push({ cls: 'instagram', href: u.instagram, label: 'Instagram', icon: '<path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>' });
        if (u.vinted)    socials.push({ cls: 'vinted',    href: u.vinted,    label: 'Vinted',    icon: '<path d="M19.5 3h-3.75L12 14.25 8.25 3H4.5L9.75 18h4.5z"/><path d="M14.25 18h4.5l1.5-4.5h-4.5z"/>' });
        if (u.olx)       socials.push({ cls: 'olx',       href: u.olx,       label: 'OLX',       icon: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>' });

        if (socials.length > 0) {
            document.getElementById('socialLinks').innerHTML = socials.map(s => `
                <a href="${s.href}" target="_blank" class="${s.cls}">
                    <svg viewBox="0 0 24 24">${s.icon}</svg> ${s.label}
                </a>`).join('');
        }
    } catch(e) { /* zostawiamy domyślne */ }
}

// ── Ładowanie produktów z folderu /produkty ──────────────────────────────────
async function loadProdukty() {
    try {
        const res = await fetch(`${API}/produkty`);
        if (!res.ok) throw new Error();

        const files = await res.json();
        const mdFiles = files.filter(f => f.name.endsWith('.md'));
        if (mdFiles.length === 0) throw new Error();

        const loaded = await Promise.all(mdFiles.map(async f => {
            const r = await fetch(f.download_url);
            return parseMD(await r.text());
        }));

        produkty = loaded.filter(p => p.title && p.images.length > 0);
        if (produkty.length === 0) throw new Error();
        renderGaleria();

    } catch(e) {
        uzyFallback();
    }
}

// ── Fallback – stare produkty jeśli CMS nie był jeszcze użyty ───────────────
function uzyFallback() {
    produkty = [
        { title: "Bordo",        images: ["img/Bordo/mainbordo1.JPG","img/Bordo/bordo2.JPG","img/Bordo/bordo3.JPG","img/Bordo/bordo4.JPG","img/Bordo/bordo5.JPG","img/Bordo/bordo6.JPG","img/Bordo/bordo7.JPG"] },
        { title: "Kielich",      images: ["img/Kielich/mainkielich1.JPG","img/Kielich/kielich2.JPG","img/Kielich/kielich3.JPG","img/Kielich/kielich4.JPG","img/Kielich/kielich5.JPG","img/Kielich/kielich6.JPG"] },
        { title: "Kolorowa misa",images: ["img/Kolorowamisa/mainkolorowamisa1.JPG","img/Kolorowamisa/kolorowamisa2.JPG","img/Kolorowamisa/kolorowamisa3.JPG","img/Kolorowamisa/kolorowamisa4.JPG","img/Kolorowamisa/kolorowamisa5.JPG","img/Kolorowamisa/kolorowamisa6.JPG","img/Kolorowamisa/kolorowamisa7.JPG","img/Kolorowamisa/kolorowamisa8.JPG","img/Kolorowamisa/kolorowamisa9.JPG","img/Kolorowamisa/kolorowamisa10.JPG","img/Kolorowamisa/kolorowamisa11.JPG"] },
        { title: "Kolorowe",     images: ["img/Kolorowe/mainkolorowe1.JPG","img/Kolorowe/kolorowe2.JPG","img/Kolorowe/kolorowe3.JPG","img/Kolorowe/kolorowe4.JPG","img/Kolorowe/kolorowe5.JPG","img/Kolorowe/kolorowe6.JPG","img/Kolorowe/kolorowe7.JPG","img/Kolorowe/kolorowe8.JPG","img/Kolorowe/kolorowe9.JPG","img/Kolorowe/kolorowe10.JPG"] },
        { title: "Patera",       images: ["img/Patera/mainpatera1.JPG","img/Patera/patera2.JPG","img/Patera/patera3.JPG"] },
        { title: "Szklane",      images: ["img/Szklane/mainszklane1.JPG","img/Szklane/szklane2.JPG","img/Szklane/szklane3.JPG","img/Szklane/szklane4.JPG","img/Szklane/szklane5.JPG","img/Szklane/szklane6.JPG"] },
        { title: "Talerz",       images: ["img/Talerz/maintalerz1.JPG","img/Talerz/talerz2.JPG","img/Talerz/talerz3.JPG","img/Talerz/talerz4.JPG","img/Talerz/talerz5.JPG","img/Talerz/talerz6.JPG","img/Talerz/talerz7.JPG","img/Talerz/talerz8.JPG","img/Talerz/talerz9.JPG","img/Talerz/talerz10.JPG"] },
        { title: "Wazon",        images: ["img/Wazon/mainwazon1.JPG","img/Wazon/wazon2.JPG","img/Wazon/wazon3.JPG","img/Wazon/wazon4.JPG","img/Wazon/wazon5.JPG"] },
        { title: "Zielone",      images: ["img/Zielone/mainzielone1.JPG","img/Zielone/zielone2.JPG","img/Zielone/zielone3.JPG","img/Zielone/zielone4.JPG","img/Zielone/zielone5.JPG","img/Zielone/zielone6.JPG"] },
    ];
    renderGaleria();
}

// ── Galeria ──────────────────────────────────────────────────────────────────
let produkty = [];
let aktualneZdjecia = [];
let aktualnyIndeks = 0;

function renderGaleria() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    produkty.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.onclick = () => otworzModal(i);
        div.innerHTML = `
            <img src="${p.images[0]}" alt="${p.title}"
                 onerror="this.style.height='100px';this.style.background='#eee'">
            <div class="item-title">${p.title}</div>`;
        gallery.appendChild(div);
    });
}

// ── Modal ────────────────────────────────────────────────────────────────────
function otworzModal(i) {
    aktualneZdjecia = produkty[i].images;
    aktualnyIndeks = 0;
    odswiezModal();
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function zmienZdjecie(dir) {
    aktualnyIndeks = (aktualnyIndeks + dir + aktualneZdjecia.length) % aktualneZdjecia.length;
    odswiezModal();
}

function odswiezModal() {
    document.getElementById('modalImg').src = aktualneZdjecia[aktualnyIndeks];
    document.getElementById('modalCounter').textContent =
        `${aktualnyIndeks + 1} / ${aktualneZdjecia.length}`;
}

document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
    if (!document.getElementById('modal').classList.contains('active')) return;
    if (e.key === 'ArrowLeft')  zmienZdjecie(-1);
    if (e.key === 'ArrowRight') zmienZdjecie(1);
    if (e.key === 'Escape')     closeModal();
});

// ── Start ────────────────────────────────────────────────────────────────────
loadUstawienia();
loadProdukty();
</script>
</body>
</html>
